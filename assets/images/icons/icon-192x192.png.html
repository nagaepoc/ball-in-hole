<!DOCTYPE html>
<html>
<head>
    <title>Placeholder Icon</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
        }
        .icon {
            width: 192px;
            height: 192px;
            background: linear-gradient(135deg, #2196f3 0%, #1976d2 100%);
            border-radius: 20%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(33, 150, 243, 0.3);
        }
        .ball {
            width: 80px;
            height: 80px;
            background: #fff;
            border-radius: 50%;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.1);
        }
        .ball:after {
            content: '';
            position: absolute;
            top: 15px;
            left: 15px;
            width: 20px;
            height: 20px;
            background: #3498db;
            border-radius: 50%;
        }
        .hole {
            position: absolute;
            width: 40px;
            height: 40px;
            background: #000;
            border-radius: 50%;
            bottom: 30px;
            right: 30px;
        }
    </style>
</head>
<body>
    <div class="icon">
        <div class="ball"></div>
        <div class="hole"></div>
    </div>
</body>
</html>
